name: Release

on:
  push:
    tags:
      - "v*.*.*"
  workflow_dispatch:
    inputs:
      version:
        description: "Semantic version to release, for example 1.0.0"
        required: true
        type: string

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
        with:
          fetch-depth: 0

      - uses: actions/setup-dotnet@67a3573c9a986a3f9c594539f4ab511d57bb3ce9
        with:
          dotnet-version: "8.0.x"

      - name: Resolve version
        id: version
        shell: bash
        env:
          INPUT_VERSION: ${{ inputs.version }}
        run: |
          if [[ "${{ github.event_name }}" == "workflow_dispatch" ]]; then
            VERSION="$INPUT_VERSION"
          else
            VERSION="${GITHUB_REF_NAME#v}"
          fi
          if [[ ! "$VERSION" =~ ^[0-9]+\.[0-9]+\.[0-9]+(-[A-Za-z0-9.-]+)?$ ]]; then
            echo "Invalid version '$VERSION'. Expected semantic version like 1.0.0 or 1.0.0-rc.1." >&2
            exit 1
          fi
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "tag=v$VERSION" >> "$GITHUB_OUTPUT"
          echo "BUILD_DATE_UTC=$(date -u +%Y-%m-%dT%H:%M:%SZ)" >> "$GITHUB_ENV"

      - name: Restore
        run: dotnet restore legacy-accessibility-static-crawler.sln

      - name: Build
        run: dotnet build legacy-accessibility-static-crawler.sln -c Release --no-restore /p:Version=${{ steps.version.outputs.version }} /p:SourceRevisionId=${GITHUB_SHA::7} /p:BuildDateUtc=${{ env.BUILD_DATE_UTC }}

      - name: Run full test suite before packaging
        run: dotnet test legacy-accessibility-static-crawler.sln -c Release --no-build --logger "trx;LogFileName=release-tests.trx"

      - name: Publish release packages with bundled pinned drivers
        shell: pwsh
        run: ./scripts/publish-all.ps1 -Version ${{ steps.version.outputs.version }}

      - name: Verify release checksums
        shell: bash
        run: |
          cd artifacts/releases
          test -s SHA256SUMS.txt
          sha256sum -c SHA256SUMS.txt

      - name: Upload workflow artifacts
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02
        with:
          name: legacy-accessibility-static-crawler-${{ steps.version.outputs.version }}
          path: |
            artifacts/releases/*

      - name: Create or update GitHub Release
        uses: softprops/action-gh-release@3bb12739c298aeb8a4eeaf626c5b8d85266b0e65
        with:
          tag_name: ${{ steps.version.outputs.tag }}
          name: legacy-accessibility-static-crawler ${{ steps.version.outputs.version }}
          generate_release_notes: true
          fail_on_unmatched_files: true
          files: |
            artifacts/releases/legacy-accessibility-static-crawler-${{ steps.version.outputs.version }}-win-x64.zip
            artifacts/releases/legacy-accessibility-static-crawler-${{ steps.version.outputs.version }}-linux-x64.tar.gz
            artifacts/releases/legacy-accessibility-static-crawler-${{ steps.version.outputs.version }}-osx-arm64.tar.gz
            artifacts/releases/legacy-accessibility-static-crawler-api-${{ steps.version.outputs.version }}-win-x64.zip
            artifacts/releases/legacy-accessibility-static-crawler-api-${{ steps.version.outputs.version }}-linux-x64.tar.gz
            artifacts/releases/legacy-accessibility-static-crawler-api-${{ steps.version.outputs.version }}-osx-arm64.tar.gz
            artifacts/releases/SHA256SUMS.txt
