name: Release

on:
  push:
    tags:
      - "v*.*.*"

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "8.0.x"

      - name: Resolve version
        id: version
        shell: bash
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "BUILD_DATE_UTC=$(date -u +%Y-%m-%dT%H:%M:%SZ)" >> "$GITHUB_ENV"

      - name: Restore
        run: dotnet restore legacy-accessibility-static-crawler.sln

      - name: Build
        run: dotnet build legacy-accessibility-static-crawler.sln -c Release --no-restore /p:Version=${{ steps.version.outputs.version }} /p:SourceRevisionId=${GITHUB_SHA::7} /p:AssemblyMetadata=BuildDateUtc=${{ env.BUILD_DATE_UTC }}

      - name: Test
        run: dotnet test legacy-accessibility-static-crawler.sln -c Release --no-build

      - name: Publish CLI win-x64
        shell: bash
        run: |
          dotnet publish src/LegacyAccessibilityCrawler.Cli/LegacyAccessibilityCrawler.Cli.csproj -c Release -r win-x64 --self-contained true /p:PublishSingleFile=true /p:IncludeNativeLibrariesForSelfExtract=true /p:EnableCompressionInSingleFile=true /p:Version=${{ steps.version.outputs.version }} /p:SourceRevisionId=${GITHUB_SHA::7} -o artifacts/legacy-a11y-crawler-win-x64
          cp -f src/LegacyAccessibilityCrawler.Cli/bin/Release/net8.0/win-x64/chromedriver.exe artifacts/legacy-a11y-crawler-win-x64/ 2>/dev/null || true
          cp -f src/LegacyAccessibilityCrawler.Cli/bin/Release/net8.0/win-x64/msedgedriver.exe artifacts/legacy-a11y-crawler-win-x64/ 2>/dev/null || true

      - name: Publish CLI linux-x64
        shell: bash
        run: |
          dotnet publish src/LegacyAccessibilityCrawler.Cli/LegacyAccessibilityCrawler.Cli.csproj -c Release -r linux-x64 --self-contained true /p:PublishSingleFile=true /p:IncludeNativeLibrariesForSelfExtract=true /p:EnableCompressionInSingleFile=true /p:Version=${{ steps.version.outputs.version }} /p:SourceRevisionId=${GITHUB_SHA::7} -o artifacts/legacy-a11y-crawler-linux-x64
          cp -f src/LegacyAccessibilityCrawler.Cli/bin/Release/net8.0/linux-x64/chromedriver artifacts/legacy-a11y-crawler-linux-x64/ 2>/dev/null || true
          cp -f src/LegacyAccessibilityCrawler.Cli/bin/Release/net8.0/linux-x64/msedgedriver artifacts/legacy-a11y-crawler-linux-x64/ 2>/dev/null || true

      - name: Publish CLI osx-arm64
        shell: bash
        run: |
          dotnet publish src/LegacyAccessibilityCrawler.Cli/LegacyAccessibilityCrawler.Cli.csproj -c Release -r osx-arm64 --self-contained true /p:PublishSingleFile=true /p:IncludeNativeLibrariesForSelfExtract=true /p:EnableCompressionInSingleFile=true /p:Version=${{ steps.version.outputs.version }} /p:SourceRevisionId=${GITHUB_SHA::7} -o artifacts/legacy-a11y-crawler-osx-arm64
          cp -f src/LegacyAccessibilityCrawler.Cli/bin/Release/net8.0/osx-arm64/chromedriver artifacts/legacy-a11y-crawler-osx-arm64/ 2>/dev/null || true
          cp -f src/LegacyAccessibilityCrawler.Cli/bin/Release/net8.0/osx-arm64/msedgedriver artifacts/legacy-a11y-crawler-osx-arm64/ 2>/dev/null || true

      - name: Publish API win-x64
        shell: bash
        run: |
          dotnet publish src/LegacyAccessibilityCrawler.Api/LegacyAccessibilityCrawler.Api.csproj -c Release -r win-x64 --self-contained true /p:Version=${{ steps.version.outputs.version }} /p:SourceRevisionId=${GITHUB_SHA::7} -o artifacts/legacy-a11y-api-win-x64
          cp -f src/LegacyAccessibilityCrawler.Api/bin/Release/net8.0/win-x64/chromedriver.exe artifacts/legacy-a11y-api-win-x64/ 2>/dev/null || true
          cp -f src/LegacyAccessibilityCrawler.Api/bin/Release/net8.0/win-x64/msedgedriver.exe artifacts/legacy-a11y-api-win-x64/ 2>/dev/null || true

      - name: Publish API linux-x64
        shell: bash
        run: |
          dotnet publish src/LegacyAccessibilityCrawler.Api/LegacyAccessibilityCrawler.Api.csproj -c Release -r linux-x64 --self-contained true /p:Version=${{ steps.version.outputs.version }} /p:SourceRevisionId=${GITHUB_SHA::7} -o artifacts/legacy-a11y-api-linux-x64
          cp -f src/LegacyAccessibilityCrawler.Api/bin/Release/net8.0/linux-x64/chromedriver artifacts/legacy-a11y-api-linux-x64/ 2>/dev/null || true
          cp -f src/LegacyAccessibilityCrawler.Api/bin/Release/net8.0/linux-x64/msedgedriver artifacts/legacy-a11y-api-linux-x64/ 2>/dev/null || true

      - name: Publish API osx-arm64
        shell: bash
        run: |
          dotnet publish src/LegacyAccessibilityCrawler.Api/LegacyAccessibilityCrawler.Api.csproj -c Release -r osx-arm64 --self-contained true /p:Version=${{ steps.version.outputs.version }} /p:SourceRevisionId=${GITHUB_SHA::7} -o artifacts/legacy-a11y-api-osx-arm64
          cp -f src/LegacyAccessibilityCrawler.Api/bin/Release/net8.0/osx-arm64/chromedriver artifacts/legacy-a11y-api-osx-arm64/ 2>/dev/null || true
          cp -f src/LegacyAccessibilityCrawler.Api/bin/Release/net8.0/osx-arm64/msedgedriver artifacts/legacy-a11y-api-osx-arm64/ 2>/dev/null || true

      - name: Package
        shell: pwsh
        run: ./scripts/create-release-package.ps1 -Version ${{ steps.version.outputs.version }}

      - name: Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            artifacts/*.zip
